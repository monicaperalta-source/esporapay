<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EsporaPay</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased}
:root{
  --black:#1d1d1f;--gray1:#f5f5f7;--gray2:#e8e8ed;--gray3:#d2d2d7;
  --gray4:#6e6e73;--gray5:#aeaeb2;--blue:#0071e3;--blue-h:#0077ed;
  --green:#34c759;--amber:#ff9f0a;--red:#ff3b30;
  --font:-apple-system,'SF Pro Display','SF Pro Text',sans-serif;
  --nav-h:57px;--sidebar-w:220px;
}
body{background:#fff;color:var(--black);font-family:var(--font);min-height:100vh}

/* AUTH */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:var(--gray1)}
.auth-card{background:#fff;border-radius:20px;padding:40px 32px;width:100%;max-width:380px;border:1px solid var(--gray2)}
.auth-logo{font-size:26px;font-weight:700;letter-spacing:-.5px;text-align:center;margin-bottom:8px}
.auth-sub{font-size:14px;color:var(--gray4);text-align:center;margin-bottom:32px}
.auth-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--gray4);display:block;margin-bottom:6px}
.auth-input{width:100%;background:var(--gray1);border:1.5px solid var(--gray2);border-radius:10px;color:var(--black);font-family:var(--font);font-size:15px;padding:12px 14px;outline:none;transition:border-color .15s;margin-bottom:16px}
.auth-input:focus{border-color:var(--blue);background:#fff}
.auth-btn{width:100%;background:var(--black);color:#fff;font-weight:600;font-family:var(--font);font-size:16px;padding:14px;border-radius:10px;border:none;cursor:pointer;transition:all .15s;margin-top:4px}
.auth-btn:hover{background:#333}
.auth-error{background:#fff2f2;border:1px solid #ffd0d0;border-radius:8px;padding:10px 14px;font-size:13px;color:var(--red);margin-bottom:16px;display:none}

/* APP */
.app{display:none;min-height:100vh}
.nav{display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:var(--nav-h);border-bottom:1px solid var(--gray2);position:sticky;top:0;background:rgba(255,255,255,.92);backdrop-filter:saturate(180%) blur(20px);z-index:100;overflow:hidden}
.nav-logo{font-size:16px;font-weight:700;letter-spacing:-.4px;white-space:nowrap}
.nav-right{display:flex;align-items:center;gap:12px}
.nav-user{font-size:12px;color:var(--gray4);display:none} @media(min-width:768px){.nav-user{display:inline}}
.nav-out{font-size:12px;color:var(--blue);cursor:pointer;font-weight:500;background:none;border:none;font-family:var(--font)}
.seg{display:flex;background:var(--gray1);border-radius:9px;padding:2px;gap:1px}
.seg-btn{padding:5px 14px;border-radius:7px;font-size:12px;font-weight:500;border:none;cursor:pointer;background:transparent;color:var(--gray4);font-family:var(--font);transition:all .18s}
.seg-btn.active{background:#fff;color:var(--black);box-shadow:0 1px 3px rgba(0,0,0,.12)}

/* LAYOUT */
.app-body{display:flex;min-height:calc(100vh - var(--nav-h))}

/* SIDEBAR */
.sidebar{width:var(--sidebar-w);flex-shrink:0;border-right:1px solid var(--gray2);padding:12px 10px;position:sticky;top:var(--nav-h);height:calc(100vh - var(--nav-h));overflow-y:auto;display:none;scrollbar-width:none}
.sidebar::-webkit-scrollbar{display:none}
@media(min-width:768px){.sidebar{display:block}}
.side-group-title{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--gray5);padding:12px 10px 5px;margin-top:4px}
.side-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:10px;cursor:pointer;transition:background .12s;margin-bottom:1px}
.side-item:hover{background:var(--gray1)}
.side-item.active{background:var(--gray1)}
.side-av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:9px;flex-shrink:0}
.av-a{background:#e3f2fd;color:#0d47a1}.av-b{background:#f3e5f5;color:#7b1fa2}
.av-c{background:#e8f5e9;color:#1b5e20}.av-d{background:#fff3e0;color:#e65100}.av-e{background:#fce4ec;color:#880e4f}
.side-name{font-size:11px;font-weight:500;color:var(--black);line-height:1.3}
.side-role{font-size:9px;color:var(--gray5);margin-top:1px}

/* MAIN */
.main{flex:1;padding:32px;display:flex;justify-content:center}
.main-inner{width:100%;max-width:620px}
.no-sidebar .main{padding:40px}
.no-sidebar .main-inner{max-width:780px}
@media(max-width:767px){
  .app-body{overflow-x:hidden}
  .main{padding:16px;overflow-x:hidden;width:100%}
  .main-inner{max-width:100%;overflow-x:hidden}
  .collab-name{font-size:17px}
  .bc-amount{font-size:36px}
  .balance-card{padding:22px 18px}
  .kpi-top{flex-wrap:wrap;gap:4px}
  .kpi-meta{font-size:10px}
  .stats-row{grid-template-columns:1fr 1fr;gap:8px}
  .stat-tile{padding:13px}
  .st-val{font-size:18px}
  .pago-row{padding:12px 14px}
  .section-title{font-size:15px}
  .kpi-item{padding:12px 14px}
  .chip-scroll-mobile{padding:0 0 8px;margin-bottom:16px}
}

/* MOBILE CHIPS */
.chip-scroll-mobile{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:20px;scrollbar-width:none}
.chip-scroll-mobile::-webkit-scrollbar{display:none}
@media(min-width:768px){.chip-scroll-mobile{display:none}}
.chip{flex-shrink:0;padding:7px 16px;border-radius:20px;font-size:13px;font-weight:500;border:1.5px solid var(--gray2);background:#fff;color:var(--gray4);cursor:pointer;transition:all .15s;white-space:nowrap}
.chip.active{background:var(--black);color:#fff;border-color:var(--black)}

/* SCREENS */
.screen{display:none}
.screen.visible{display:block;animation:fadeUp .2s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* COLAB VIEW */
.collab-header{display:flex;align-items:center;gap:12px;margin-bottom:20px;min-width:0}
.avatar{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;flex-shrink:0}
.collab-name{font-size:18px;font-weight:700;letter-spacing:-.4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.collab-role{font-size:13px;color:var(--gray4);margin-top:2px}
.badge{display:inline-block;margin-top:5px;font-size:10px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;padding:3px 9px;border-radius:20px}
.badge-a{background:#e3f2fd;color:#0d47a1}.badge-b{background:var(--gray1);color:var(--gray4)}
.badge-c{background:#e8f5e9;color:#1b5e20}.badge-bp{background:#fff3e0;color:#e65100}

.balance-card{background:var(--black);border-radius:20px;padding:28px;margin-bottom:16px}
.no-sidebar .balance-card{padding:36px 40px;border-radius:24px}
.no-sidebar .bc-amount{font-size:56px}
.bc-label{font-size:11px;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.06em;font-weight:500;margin-bottom:8px}
.bc-amount{font-size:44px;font-weight:700;color:#fff;letter-spacing:-1.5px;line-height:1}
.bc-amount sup{font-size:20px;font-weight:500;vertical-align:super;opacity:.5;letter-spacing:0}
.bc-period{font-size:12px;color:rgba(255,255,255,.3);margin-top:12px}

.stats-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:24px}
.no-sidebar .stats-row{grid-template-columns:repeat(3,1fr)}
.stat-tile{background:var(--gray1);border-radius:14px;padding:16px}
.st-label{font-size:11px;color:var(--gray4);text-transform:uppercase;letter-spacing:.04em;font-weight:500;margin-bottom:6px}
.st-val{font-size:20px;font-weight:700;letter-spacing:-.4px}
.st-sub{font-size:11px;color:var(--gray5);margin-top:3px}

.section-title{font-size:17px;font-weight:700;letter-spacing:-.3px;margin-bottom:14px}

.kpi-list{display:flex;flex-direction:column;background:var(--gray1);border-radius:16px;overflow:hidden;margin-bottom:24px}
.kpi-item{padding:14px 16px;border-bottom:1px solid var(--gray2)}
.kpi-item:last-child{border-bottom:none}
.kpi-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;gap:8px}
.kpi-name{font-size:14px;font-weight:500;flex:1}
.kpi-meta{font-size:11px;color:var(--gray4);white-space:nowrap}
.progress-wrap{height:5px;background:var(--gray2);border-radius:10px;overflow:hidden}
.progress-fill{height:100%;border-radius:10px;transition:width .5s ease}
.fill-green{background:var(--green)}.fill-amber{background:var(--amber)}.fill-red{background:var(--red)}.fill-gray{background:var(--gray3)}
.kpi-bottom{display:flex;justify-content:space-between;margin-top:6px}
.kpi-pct{font-size:12px;font-weight:600}
.kpi-pct.green{color:var(--green)}.kpi-pct.amber{color:var(--amber)}.kpi-pct.red{color:var(--red)}.kpi-pct.gray{color:var(--gray4)}
.kpi-earned{font-size:12px;color:var(--gray4)}
.kpi-earned strong{color:var(--black)}

.pago-tile{background:var(--gray1);border-radius:16px;overflow:hidden;margin-bottom:28px}
.pago-row{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-bottom:1px solid var(--gray2)}
.pago-row:last-child{border-bottom:none;background:#fff}
.pr-label{font-size:14px;color:var(--black)}
.pr-val{font-size:15px;font-weight:600}
.pr-val.green{color:var(--green)}.pr-val.total{font-size:18px;font-weight:700}

.empty-state{text-align:center;padding:48px 0;color:var(--gray4);font-size:14px;line-height:1.6}
.loading{text-align:center;padding:48px;color:var(--gray4);font-size:14px}

/* ADMIN */
.admin-tabs{display:flex;border-bottom:1px solid var(--gray2);margin-bottom:24px}
.admin-tab{flex:1;text-align:center;font-size:13px;font-weight:500;padding:12px 4px;background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;font-family:var(--font);color:var(--gray4);transition:all .15s}
.admin-tab.active{color:var(--blue);border-bottom-color:var(--blue)}
.admin-panel{display:none}
.admin-panel.visible{display:block;animation:fadeUp .15s ease}

.form-block{margin-bottom:16px}
.form-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--gray4);display:block;margin-bottom:6px}
.form-field{width:100%;background:var(--gray1);border:1.5px solid var(--gray2);border-radius:10px;color:var(--black);font-family:var(--font);font-size:15px;padding:12px 14px;outline:none;transition:border-color .15s;-webkit-appearance:none;appearance:none}
.form-field:focus{border-color:var(--blue);background:#fff}
.form-field::placeholder{color:var(--gray3)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.btn-apple{width:100%;background:var(--blue);color:#fff;font-weight:600;font-family:var(--font);font-size:16px;padding:14px;border-radius:10px;border:none;cursor:pointer;transition:all .15s;margin-top:4px}
.btn-apple:hover{background:var(--blue-h)}.btn-apple:active{transform:scale(.98)}.btn-apple:disabled{background:var(--gray3);cursor:not-allowed}

.collab-card-admin{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--gray2)}
.collab-card-admin:last-child{border-bottom:none}
.cca-left{display:flex;align-items:center;gap:12px}
.cca-name{font-size:14px;font-weight:600;letter-spacing:-.1px}
.cca-meta{font-size:12px;color:var(--gray5);margin-top:2px}
.cca-amount{font-size:17px;font-weight:700;letter-spacing:-.3px}
.cca-count{font-size:11px;color:var(--gray5);text-align:right;margin-top:2px}

.total-banner{background:var(--black);border-radius:16px;padding:20px 24px;display:flex;justify-content:space-between;align-items:center;margin-top:24px}
.tb-label{font-size:13px;color:rgba(255,255,255,.5);font-weight:500}
.tb-amount{font-size:24px;font-weight:700;color:#fff;letter-spacing:-.5px}

.kpi-input-card{background:var(--gray1);border-radius:14px;padding:16px;margin-bottom:12px}
.kpi-input-name{font-size:14px;font-weight:600;margin-bottom:10px}
.kpi-input-row{display:flex;align-items:center;gap:12px}
.kpi-input-row label{font-size:12px;color:var(--gray4);width:110px;flex-shrink:0}
.kpi-input-row input{flex:1;background:#fff;border:1.5px solid var(--gray2);border-radius:8px;color:var(--black);font-family:var(--font);font-size:14px;padding:9px 12px;outline:none}
.kpi-input-row input:focus{border-color:var(--blue)}
.kpi-input-max{font-size:11px;color:var(--gray5);margin-top:6px}

.team-row{display:flex;align-items:center;justify-content:space-between;padding:13px 0;border-bottom:1px solid var(--gray2)}
.team-row:last-child{border-bottom:none}
.resumen-section-title{font-size:16px;font-weight:700;letter-spacing:-.3px;color:var(--black);padding:16px 0 8px;border-bottom:2px solid var(--black);margin-bottom:8px}
.resumen-group-title{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--gray5);padding:16px 0 8px;border-bottom:1px solid var(--gray2);margin-bottom:4px}

.resumen-totales{
  background:var(--gray1);border-radius:16px;padding:20px;margin-top:24px;
  border:1px solid var(--gray2);
}
.rt-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0}
.rt-label{font-size:14px;color:var(--gray4)}
.rt-val{font-size:15px;font-weight:600;color:var(--black)}
.rt-val.green{color:var(--green)}
.rt-divider{border:none;border-top:1.5px solid var(--gray2);margin:8px 0}
.rt-label-total{font-size:15px;font-weight:700;color:var(--black)}
.rt-val-total{font-size:20px;font-weight:700;color:var(--black)}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(70px);background:var(--black);color:#fff;padding:11px 22px;border-radius:30px;font-size:13px;font-weight:500;transition:transform .25s cubic-bezier(.34,1.56,.64,1);z-index:999;pointer-events:none;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}

/* Apple hover animations */
.side-drag-handle{font-size:14px;color:var(--gray3);cursor:grab;padding-right:4px;flex-shrink:0;user-select:none}
.side-drag-handle:active{cursor:grabbing}
.side-item.drag-over{background:var(--gray2);transform:scale(1.02)}
.side-item{transition:background .15s ease,transform .15s ease;cursor:pointer}
.side-item:hover{background:var(--gray1);transform:translateX(2px)}
.side-item.active{background:var(--gray1)}
.chip{transition:all .2s cubic-bezier(.34,1.56,.64,1)}
.chip:hover{transform:scale(1.05);border-color:var(--gray3)}
.chip.active{transform:scale(1.02)}
.kpi-item{transition:background .15s ease}
.kpi-item:hover{background:#efefef}
.stat-tile{transition:transform .18s ease,box-shadow .18s ease}
.stat-tile:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.06)}
.pago-row{transition:background .12s ease}
.pago-row:hover{background:#f9f9f9}
.collab-card-admin{transition:background .12s ease}
.collab-card-admin:hover{background:var(--gray1)}
.balance-card{transition:transform .2s ease}
.balance-card:hover{transform:scale(1.005)}
.btn-apple{transition:all .18s cubic-bezier(.34,1.56,.64,1)}
.btn-apple:hover{transform:scale(1.02)}
.btn-apple:active{transform:scale(.97)}
.auth-btn{transition:all .18s ease}
.auth-btn:hover{transform:scale(1.01)}

/* Alert & Success styles */
.balance-card-success{background:linear-gradient(135deg,#1b5e20,#34c759) !important}
.stat-tile-success{background:#f0faf3;border:1.5px solid #c6f0d8}
.text-green{color:var(--green) !important}
/* Alert styles */
.balance-card-alert{background:linear-gradient(135deg,#c0392b,#e74c3c) !important}
.stat-tile-alert{background:#fff2f2;border:1.5px solid #ffd0d0}
.text-red{color:var(--red) !important}
.alerta-basal-bar{background:#fff2f2;border:1.5px solid #ffd0d0;border-radius:14px;padding:14px 16px;margin-bottom:20px}
.alerta-basal-label{display:flex;justify-content:space-between;font-size:12px;font-weight:600;color:var(--red);margin-bottom:8px}
.alerta-basal-track{height:6px;background:#ffd0d0;border-radius:6px;overflow:hidden;margin-bottom:6px}
.alerta-basal-fill{height:100%;background:var(--red);border-radius:6px;transition:width .5s ease}
.alerta-basal-sub{font-size:11px;color:var(--red)}
.bc-alert-msg{font-size:12px;color:rgba(255,255,255,.8);margin-top:8px;font-weight:500}
.pago-row-alert{background:#fff2f2}
.collab-card-alert{background:#fff8f8}
</style>
</head>
<body>

<!-- AUTH -->
<div class="auth-wrap" id="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">EsporaPay</div>
    <div class="auth-sub">Ingresa con tu cuenta</div>
    <div class="auth-error" id="auth-error"></div>
    <label class="auth-label">Correo</label>
    <input class="auth-input" type="email" id="login-email" placeholder="correo@espora.mx" autocomplete="email">
    <label class="auth-label">Contraseña</label>
    <input class="auth-input" type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password">
    <button class="auth-btn" onclick="login()">Entrar</button>
  </div>
</div>

<!-- APP -->
<div class="app" id="app">
  <nav class="nav">
    <div class="nav-logo">EsporaPay</div>
    <div class="nav-right">
      <span class="nav-user" id="nav-user"></span>
      <div class="seg" id="admin-seg" style="display:none">
        <button class="seg-btn active" onclick="switchMode('colab')">Mi cuenta</button>
        <button class="seg-btn" onclick="switchMode('admin')">Admin</button>
      </div>
      <button class="nav-out" onclick="logout()">Salir</button>
    </div>
  </nav>

  <canvas id="page-confetti" style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999"></canvas>
  <div class="app-body">
    <div class="sidebar" id="sidebar">
      <div id="sidebar-list"></div>
    </div>

    <div class="main">
      <div class="main-inner">

        <!-- COLAB -->
        <div class="screen visible" id="screen-colab">
          <div class="chip-scroll-mobile" id="chip-scroll-mobile"></div>
          <div id="colab-content"><div class="loading">Cargando...</div></div>
        </div>

        <!-- ADMIN -->
        <div class="screen" id="screen-admin">
          <div class="admin-tabs">
            <button class="admin-tab active" onclick="switchAdminTab('registrar',this)">Registrar</button>
            <button class="admin-tab" onclick="switchAdminTab('resumen',this)">Resumen</button>
            <button class="admin-tab" onclick="switchAdminTab('equipo',this)">Equipo</button>
          </div>

          <div class="admin-panel visible" id="panel-registrar">
            <div class="form-grid">
              <div class="form-block">
                <label class="form-label">Colaborador</label>
                <select class="form-field" id="f-colab" onchange="loadKpisForAdmin()"></select>
              </div>
              <div class="form-block">
                <label class="form-label">Período</label>
                <select class="form-field" id="f-periodo"></select>
              </div>
            </div>
            <div id="kpi-inputs-admin"><div class="empty-state">Selecciona un colaborador</div></div>
            <div id="admin-preview" style="display:none;margin-bottom:16px"></div>
          <button class="btn-apple" onclick="guardarRegistro()" id="btn-guardar">Guardar registros</button>
          </div>

          <div class="admin-panel" id="panel-resumen">
            <div style="margin-bottom:20px">
              <div style="font-size:13px;color:var(--gray4);margin-bottom:4px" id="adm-period-label"></div>
              <div style="font-size:22px;font-weight:700;letter-spacing:-.5px">Resumen del período</div>
            </div>
            <div id="adm-list"><div class="loading">Cargando...</div></div>
            <div class="resumen-totales">
              <div class="rt-row">
                <span class="rt-label">Total pagos basales</span>
                <span class="rt-val" id="adm-basales">$0</span>
              </div>
              <div class="rt-row">
                <span class="rt-label">Total diferenciación KPIs</span>
                <span class="rt-val" style="color:var(--green)" id="adm-kpis">$0</span>
              </div>
              <div class="rt-divider"></div>
              <div class="rt-row">
                <span class="rt-label-total">Acumulado total a pagar</span>
                <span class="rt-val-total" id="adm-total">$0</span>
              </div>
            </div>
          </div>

          <div class="admin-panel" id="panel-equipo">
            <div id="team-list"><div class="loading">Cargando...</div></div>
            <div style="margin-top:32px;padding-top:28px;border-top:1px solid var(--gray2)">
              <div class="section-title">Nuevo colaborador</div>
              <div class="form-grid" style="margin-top:16px">
                <div class="form-block"><label class="form-label">Nombre completo</label><input class="form-field" id="new-nombre" placeholder="Nombre completo"></div>
                <div class="form-block"><label class="form-label">Correo</label><input class="form-field" id="new-email" type="email" placeholder="correo@espora.mx"></div>
              </div>
              <div class="form-grid">

function launchPageConfetti(){
  const canvas=document.getElementById('page-confetti');
  if(!canvas)return;
  const ctx=canvas.getContext('2d');
  canvas.width=window.innerWidth;canvas.height=window.innerHeight;
  const colors=['#34c759','#0071e3','#ff9f0a','#af52de','#34c759','#007aff','#ff3b30'];
  const pieces=[];
  for(let i=0;i<120;i++){
    pieces.push({
      x:Math.random()*canvas.width,y:-20,
      w:Math.random()*10+4,h:Math.random()*10+4,
      color:colors[Math.floor(Math.random()*colors.length)],
      vx:(Math.random()-.5)*6,vy:Math.random()*5+2,
      rot:Math.random()*360,vr:(Math.random()-.5)*15,alpha:1
    });
  }
  let frame=0;
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pieces.forEach(p=>{
      ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot*Math.PI/180);
      ctx.globalAlpha=Math.max(0,p.alpha);ctx.fillStyle=p.color;
      ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);ctx.restore();
      p.x+=p.vx;p.y+=p.vy;p.rot+=p.vr;p.vy+=.15;
      if(frame>40)p.alpha-=.018;
    });
    frame++;
    if(frame<110)requestAnimationFrame(draw);
    else ctx.clearRect(0,0,canvas.width,canvas.height);
  }
  draw();
}

let dragSrc=null,dragGrupo=null;
function initDragDrop(){
  document.querySelectorAll('.side-drag-handle').forEach(handle=>{
    handle.addEventListener('dragstart',e=>{
      const item=handle.closest('.side-item');
      dragSrc=item.dataset.id;
      dragGrupo=item.dataset.grupo;
      e.dataTransfer.setData('text/plain',dragSrc);
      e.dataTransfer.effectAllowed='move';
      setTimeout(()=>item.style.opacity='.4',0);
    });
    handle.addEventListener('dragend',e=>{
      document.querySelectorAll('.side-item').forEach(x=>{x.style.opacity='';x.classList.remove('drag-over')});
      dragSrc=null;dragGrupo=null;
    });
  });

  document.querySelectorAll('.side-item').forEach(el=>{
    el.addEventListener('dragenter',e=>{e.preventDefault()});
    el.addEventListener('dragover',e=>{
      e.preventDefault();
      e.dataTransfer.dropEffect='move';
      if(el.dataset.id!==dragSrc&&el.dataset.grupo===dragGrupo){
        document.querySelectorAll('.side-item').forEach(x=>x.classList.remove('drag-over'));
        el.classList.add('drag-over');
      }
    });
    el.addEventListener('dragleave',e=>{el.classList.remove('drag-over')});
    el.addEventListener('drop',async e=>{
      e.preventDefault();e.stopPropagation();
      const toId=el.dataset.id;
      const toGrupo=el.dataset.grupo;
      if(!dragSrc||toId===dragSrc||toGrupo!==dragGrupo)return;
      el.classList.remove('drag-over');

      // Reorder within the group
      const grouped=sortedColabs();
      const list=[...grouped[dragGrupo]];
      const fromIdx=list.findIndex(c=>c.id===dragSrc);
      const toIdx=list.findIndex(c=>c.id===toId);
      if(fromIdx<0||toIdx<0)return;
      const[moved]=list.splice(fromIdx,1);
      list.splice(toIdx,0,moved);

      // Update orden locally and in DB
      const updates=[];
      let orden=0;
      GRUPO_ORDER.forEach(g=>{
        const gList=g===dragGrupo?list:(sortedColabs()[g]||[]);
        gList.forEach(c=>{
          const col=colaboradores.find(x=>x.id===c.id);
          if(col)col.orden=orden;
          updates.push({id:c.id,orden});
          orden++;
        });
      });
      // Save all to DB
      await Promise.all(updates.map(u=>sb.from('colaboradores').update({orden:u.orden}).eq('id',u.id)));
      renderSidebar();
      renderChipsMobile();
    });
  });
}

async function renderColabView(colabId){

  const idx=colaboradores.findIndex(c=>c.id===colabId);
  let totalPago=0,diferenciacion=0,bonoBruto=0;

  if(colab.tipo==='A'){
    kpis?.forEach(k=>{const r=registros?.find(x=>x.kpi_id===k.id);bonoBruto+=colab.pago_maximo*((r?.cumplimiento_pct||0)/100)});
    if(bonoBruto>colab.pago_basal){diferenciacion=bonoBruto-colab.pago_basal;totalPago=bonoBruto}
    else totalPago=colab.pago_basal;
  }else if(colab.tipo==='B'){totalPago=colab.pago_basal}
  else if(colab.tipo==='C'){kpis?.forEach(k=>{const r=registros?.find(x=>x.kpi_id===k.id);totalPago+=(r?.cantidad||0)*(k.valor_unitario||0)})}
  else if(colab.tipo==='B+'){totalPago=colab.pago_basal;kpis?.forEach(k=>{const r=registros?.find(x=>x.kpi_id===k.id);totalPago+=(r?.cantidad||0)*(k.valor_unitario||0)})}

  const periodoLabel=currentPeriodo
    ?new Date(currentPeriodo.fecha_inicio+'T12:00:00').toLocaleDateString('es-MX',{day:'numeric',month:'short'})+' → '+new Date(currentPeriodo.fecha_fin+'T12:00:00').toLocaleDateString('es-MX',{day:'numeric',month:'short',year:'numeric'}):'—';

  const noLlegoBasal = colab.tipo==='A' && bonoBruto < colab.pago_basal && bonoBruto > 0;
  const sinActividad = colab.tipo==='A' && bonoBruto === 0;
  const superaBasal = colab.tipo==='A' && bonoBruto > colab.pago_basal;
  const alerta = noLlegoBasal || sinActividad;

  let html=`
    <div class="collab-header">
      <div class="avatar ${avClass(idx)}">${initials(colab.nombre)}</div>
      <div><div class="collab-name">${colab.nombre}</div><div class="collab-role">${colab.puesto||''}</div>
      <span class="badge ${BADGE_MAP[colab.tipo]}">${BADGE_LABEL[colab.tipo]}</span></div>
    </div>
    <div class="balance-card ${alerta?'balance-card-alert':superaBasal?'balance-card-success':''}">
      <div class="bc-label">${alerta?'⚠️ ALERTA DE PAGO':superaBasal?'🎉 TOTAL A PAGAR':'TOTAL A PAGAR'}</div>
      <div class="bc-amount"><sup>$</sup>${Math.round(totalPago).toLocaleString('es-MX')}</div>
      <div class="bc-period">${periodoLabel}</div>
      ${alerta?`<div class="bc-alert-msg">${sinActividad?'Sin actividad registrada este período':'No alcanzó el pago basal de '+fmt(colab.pago_basal)}</div>`:''}
      ${superaBasal?`<div class="bc-alert-msg" style="color:rgba(255,255,255,.9)">¡Superaste tu pago basal! +${fmt(diferenciacion)} extra</div>`:''}
    </div>`;

  if(colab.tipo==='A'){
    const pct=colab.pago_maximo>0?Math.round((bonoBruto/colab.pago_maximo)*100):0;
    const pctBasal=colab.pago_basal>0?Math.round((bonoBruto/colab.pago_basal)*100):0;
    html+=`<div class="stats-row">
      <div class="stat-tile ${alerta?'stat-tile-alert':superaBasal?'stat-tile-success':''}">
        <div class="st-label">Pago basal</div>
        <div class="st-val ${alerta?'text-red':superaBasal?'text-green':''}">${fmt(colab.pago_basal)}</div>
        <div class="st-sub">${alerta?'⚠️ No alcanzado':superaBasal?'✓ Superado':'garantizado'}</div>
      </div>
      <div class="stat-tile ${superaBasal?'stat-tile-success':''}">
        <div class="st-label">Bono acumulado</div>
        <div class="st-val ${alerta?'text-red':superaBasal?'text-green':''}">${fmt(bonoBruto)}</div>
        <div class="st-sub">${alerta?`${pctBasal}% del basal`:superaBasal?`+${fmt(diferenciacion)} extra`:`de ${fmt(colab.pago_maximo)} máx · ${pct}%`}</div>
      </div>
    </div>
    ${alerta?`<div class="alerta-basal-bar">
      <div class="alerta-basal-label"><span>Progreso hacia el basal</span><span>${pctBasal}%</span></div>
      <div class="alerta-basal-track"><div class="alerta-basal-fill" style="width:${Math.min(pctBasal,100)}%"></div></div>

      }else{

    const ex=totalPago-colab.pago_basal;
    if(ex>0)html+=`<div class="pago-row"><span class="pr-label">Estudios extra</span><span class="pr-val green">${fmt(ex)}</span></div>`;
  }else{
    kpis?.forEach(k=>{const r=registros?.find(x=>x.kpi_id===k.id);const qty=r?.cantidad||0;const p=k.valor_unitario||0;if(qty>0)html+=`<div class="pago-row"><span class="pr-label">${k.nombre}</span><span class="pr-val">${fmt(qty*p)}</span></div>`});
  }
  html+=`<div class="pago-row"><span class="pr-label" style="font-weight:600">Total a pagar</span><span class="pr-val total">${fmt(totalPago)}</span></div></div>`;
  el.innerHTML=html;
  el.dataset.loaded='1';
  el.style.opacity='';
  if(superaBasal) setTimeout(launchPageConfetti, 300);
}

  document.getElementById('f-colab').innerHTML=colaboradores.map(c=>`<option value="${c.id}">${c.nombre}</option>`).join('');
  document.getElementById('f-periodo').innerHTML=periodos.map(p=>`<option value="${p.id}" ${p.activo?'selected':''}>${fmtPeriodo(p)}</option>`).join('');

}

function fmtPeriodo(p){
  const i=new Date(p.fecha_inicio+'T12:00:00').toLocaleDateString('es-MX',{day:'numeric',month:'short'});
  const f=new Date(p.fecha_fin+'T12:00:00').toLocaleDateString('es-MX',{day:'numeric',month:'short',year:'numeric'});
  return`${i} → ${f}`;
}

let _prevAbove=false;

function launchConfetti(){
  const canvas=document.getElementById('preview-confetti');
  if(!canvas)return;
  const ctx=canvas.getContext('2d');
  const p=canvas.parentElement;
  canvas.width=p.offsetWidth;canvas.height=p.offsetHeight;
  const colors=['#34c759','#0071e3','#ff9f0a','#af52de','#34c759','#007aff'];
  const pieces=[];
  for(let i=0;i<70;i++){
    pieces.push({x:Math.random()*canvas.width,y:-10,w:Math.random()*8+3,h:Math.random()*8+3,
      color:colors[Math.floor(Math.random()*colors.length)],
      vx:(Math.random()-.5)*5,vy:Math.random()*4+2,rot:Math.random()*360,vr:(Math.random()-.5)*12,alpha:1});
  }
  let frame=0;
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pieces.forEach(p=>{
      ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot*Math.PI/180);
      ctx.globalAlpha=Math.max(0,p.alpha);ctx.fillStyle=p.color;
      ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);ctx.restore();
      p.x+=p.vx;p.y+=p.vy;p.rot+=p.vr;p.vy+=.12;
      if(frame>25)p.alpha-=.025;
    });
    frame++;
    if(frame<90)requestAnimationFrame(draw);
    else ctx.clearRect(0,0,canvas.width,canvas.height);
  }
  draw();
}

function updateAdminPreview(){
  const colabId=document.getElementById('f-colab').value;
  const colab=colaboradores.find(c=>c.id===colabId);
  if(!colab||colab.tipo!=='A')return;
  const preview=document.getElementById('admin-preview');
  if(!preview)return;
  let bono=0;
  document.querySelectorAll('#kpi-inputs-admin input[data-tipo="porcentaje"]').forEach(inp=>{
    const val=parseFloat(inp.value)||0;
    bono+=colab.pago_maximo*(val/100);
  });
  const above=bono>=colab.pago_basal;
  const nowAbove=above&&!_prevAbove;
  _prevAbove=above;
  const pctBasal=colab.pago_basal>0?Math.round((bono/colab.pago_basal)*100):0;
  const total=above?bono:colab.pago_basal;

  preview.style.display='block';
  preview.innerHTML=`
    <div style="position:relative;overflow:hidden;background:${above?'#f0faf3':'#fff2f2'};border:1.5px solid ${above?'#c6f0d8':'#ffd0d0'};border-radius:14px;padding:16px;transition:all .4s ease">
      <canvas id="preview-confetti" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none"></canvas>
      <div style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:${above?'var(--green)':'var(--red)'};margin-bottom:10px;display:flex;align-items:center;gap:6px">
        <span id="preview-icon" style="font-size:16px;transition:transform .4s">${above?'🎯':'⚠️'}</span>
        ${above?'¡Superaste el pago basal!':'Por debajo del pago basal'}
      </div>
      ${above?`<div style="background:#fff;border-radius:10px;padding:10px 14px;margin-bottom:12px;border:1px solid #c6f0d8;display:flex;align-items:center;gap:10px">
        <span style="font-size:20px">🎉</span>
        <div><div style="font-size:13px;font-weight:700;color:#1b5e20">¡Superaste tu pago basal!</div>
        <div style="font-size:11px;color:#2d7a3a;margin-top:2px">Cada punto adicional ahora es diferenciación de pago</div></div>
      </div>`:''}
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <span style="font-size:13px;color:var(--gray4)">Bono acumulado</span>
        <span style="font-size:15px;font-weight:700;color:${above?'var(--green)':'var(--red)'}">${fmt(bono)}</span>
      </div>
      <div style="height:6px;background:${above?'#c6f0d8':'#ffd0d0'};border-radius:6px;overflow:hidden;margin-bottom:6px">
        <div style="height:100%;width:${Math.min(pctBasal,100)}%;background:${above?'var(--green)':'var(--red)'};border-radius:6px;transition:width .4s cubic-bezier(.34,1.56,.64,1)"></div>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:11px;color:${above?'var(--green)':'var(--gray4)'};margin-bottom:12px">
        <span>${pctBasal}% del basal</span>
        <span>${above?'Excedente: '+fmt(bono-colab.pago_basal):'Faltan '+fmt(colab.pago_basal-bono)}</span>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;padding-top:10px;border-top:1px solid ${above?'#c6f0d8':'#ffd0d0'}">
        <span style="font-size:13px;font-weight:600">Total a pagar</span>
        <span style="font-size:18px;font-weight:700;color:${above?'var(--green)':'var(--red)'}">${fmt(total)}</span>
      </div>
    </div>`;

  if(nowAbove) setTimeout(launchConfetti, 50);
}

async function guardarRegistro(){
  const colabId=document.getElementById('f-colab').value;
  const periodoId=document.getElementById('f-periodo').value;
  const btn=document.getElementById('btn-guardar');
  btn.disabled=true;btn.textContent='Guardando...';
  const inputs=document.querySelectorAll('#kpi-inputs-admin input[data-kpi-id]');
  const{data:existing}=await sb.from('registros').select('id,kpi_id').eq('colaborador_id',colabId).eq('periodo_id',periodoId);
  for(const inp of inputs){
    const kpiId=inp.dataset.kpiId;const tipo=inp.dataset.tipo;const val=parseFloat(inp.value)||0;
    const obj={colaborador_id:colabId,kpi_id:kpiId,periodo_id:periodoId};
    if(tipo==='porcentaje')obj.cumplimiento_pct=val;else obj.cantidad=val;
    const ex=existing?.find(e=>e.kpi_id===kpiId);
    if(ex)await sb.from('registros').update(obj).eq('id',ex.id);
    else await sb.from('registros').insert(obj);
  }
  btn.disabled=false;btn.textContent='Guardar registros';
  showToast('✓ Registros guardados');
  await renderAdminResumen();
  if(selectedColabId===colabId)await renderColabView(colabId);
}

async function renderAdminResumen(){
  if(!currentPeriodo)return;
  document.getElementById('adm-period-label').textContent=fmtPeriodo(currentPeriodo);
  const[{data:allRegs},{data:allKpis}]=await Promise.all([
    sb.from('registros').select('*').eq('periodo_id',currentPeriodo.id),
    sb.from('kpis').select('*')
  ]);
  const grouped=sortedColabs();
  let grand=0,totalBasales=0,totalKpis=0;
  const colabData={};

  // Calcular totales por colaborador
  colaboradores.forEach(c=>{
    const kpis=allKpis?.filter(k=>k.colaborador_id===c.id)||[];
    const regs=allRegs?.filter(r=>r.colaborador_id===c.id)||[];
    let basal=0,extra=0,total=0,bonoCal=0;
    if(c.tipo==='A'){
      kpis.forEach(k=>{const r=regs.find(x=>x.kpi_id===k.id);bonoCal+=c.pago_maximo*((r?.cumplimiento_pct||0)/100)});
      basal=c.pago_basal;
      extra=bonoCal>c.pago_basal?bonoCal-c.pago_basal:0;
      total=bonoCal>c.pago_basal?bonoCal:c.pago_basal;
      totalBasales+=basal;
      totalKpis+=extra;
    } else if(c.tipo==='B'){
      basal=c.pago_basal;total=basal;totalBasales+=basal;
    } else if(c.tipo==='C'){
      kpis.forEach(k=>{const r=regs.find(x=>x.kpi_id===k.id);extra+=(r?.cantidad||0)*(k.valor_unitario||0)});
      total=extra;totalKpis+=extra;
    } else if(c.tipo==='B+'){
      basal=c.pago_basal;
      kpis.forEach(k=>{const r=regs.find(x=>x.kpi_id===k.id);extra+=(r?.cantidad||0)*(k.valor_unitario||0)});
      total=basal+extra;totalBasales+=basal;totalKpis+=extra;
    }
    grand+=total;
    colabData[c.id]={basal,extra,total};
  });

  const gLabel=g=>({Director:'Directores',Gerente:'Gerentes',Diseñador:'Diseñadores',Performance:'Performance'}[g]||g);

  // SECCIÓN 1 — Pagos basales
  let htmlBasales=`<div class="resumen-section-title">Pagos basales</div>`;
  GRUPO_ORDER.forEach(g=>{
    const gc=grouped[g]?.filter(c=>c.tipo==='A'||c.tipo==='B'||c.tipo==='B+')||[];
    if(!gc.length)return;
    htmlBasales+=`<div class="resumen-group-title">${gLabel(g)}</div>`;
    gc.forEach(c=>{
      const idx=colaboradores.findIndex(x=>x.id===c.id);
      const d=colabData[c.id];
      htmlBasales+=`<div class="collab-card-admin">
        <div class="cca-left"><div class="avatar ${avClass(idx)}" style="width:36px;height:36px;font-size:12px">${initials(c.nombre)}</div>
        <div><div class="cca-name">${c.nombre}</div><div class="cca-meta">${c.puesto||''}</div></div></div>
        <div><div class="cca-amount">${fmt(d.basal)}</div><div class="cca-count">basal garantizado</div></div>
      </div>`;
    });
  });

  // SECCIÓN 2 — Diferenciación KPIs / Entregables
  let htmlKpis=`<div class="resumen-section-title" style="margin-top:28px">Diferenciación KPIs / Entregables</div>`;
  let hayKpis=false;
  GRUPO_ORDER.forEach(g=>{
    const gc=grouped[g]?.filter(c=>colabData[c.id]?.extra>0)||[];
    if(!gc.length)return;
    hayKpis=true;
    htmlKpis+=`<div class="resumen-group-title">${gLabel(g)}</div>`;
    gc.forEach(c=>{
      const idx=colaboradores.findIndex(x=>x.id===c.id);
      const d=colabData[c.id];
      const label=c.tipo==='A'?'diferenciación':c.tipo==='C'?'entregables':'extras';
      htmlKpis+=`<div class="collab-card-admin">
        <div class="cca-left"><div class="avatar ${avClass(idx)}" style="width:36px;height:36px;font-size:12px">${initials(c.nombre)}</div>
        <div><div class="cca-name">${c.nombre}</div><div class="cca-meta">${c.puesto||''} · ${label}</div></div></div>
        <div><div class="cca-amount" style="color:var(--green)">${fmt(d.extra)}</div></div>
      </div>`;
    });
  });
  if(!hayKpis) htmlKpis+=`<div class="empty-state" style="padding:20px 0">Sin diferenciaciones este período</div>`;

  document.getElementById('adm-list').innerHTML=htmlBasales+htmlKpis;
  document.getElementById('adm-total').textContent=fmt(grand);
  document.getElementById('adm-basales').textContent=fmt(totalBasales);
  document.getElementById('adm-kpis').textContent=fmt(totalKpis);
}

async function renderKpisTab(){
  if(!currentPeriodo)return;
  document.getElementById('kpis-period-label').textContent=fmtPeriodo(currentPeriodo);
  const[{data:allRegs},{data:allKpis}]=await Promise.all([
    sb.from('registros').select('*').eq('periodo_id',currentPeriodo.id),
    sb.from('kpis').select('*')
  ]);
  const grouped=sortedColabs();
  const gLabel=g=>({Director:'Directores',Gerente:'Gerentes',Diseñador:'Diseñadores',Performance:'Performance'}[g]||g);
  let totalDif=0,countDif=0,html='';

  GRUPO_ORDER.forEach(g=>{
    const gc=grouped[g]||[];
    const conExtra=gc.filter(c=>{
      const kpis=allKpis?.filter(k=>k.colaborador_id===c.id)||[];
      const regs=allRegs?.filter(r=>r.colaborador_id===c.id)||[];
      let extra=0;
      if(c.tipo==='A'){
        let b=0;kpis.forEach(k=>{const r=regs.find(x=>x.kpi_id===k.id);b+=c.pago_maximo*((r?.cumplimiento_pct||0)/100)});
        extra=b>c.pago_basal?b-c.pago_basal:0;
      } else if(c.tipo==='C'||c.tipo==='B+'){
        kpis.forEach(k=>{const r=regs.find(x=>x.kpi_id===k.id);extra+=(r?.cantidad||0)*(k.valor_unitario||0)});
        if(c.tipo==='B+') extra=Math.max(0,extra);
      }
      return extra>0;
    });
    if(!conExtra.length)return;
    html+=`<div class="resumen-group-title">${gLabel(g)}</div>`;
    conExtra.forEach(c=>{
      const kpis=allKpis?.filter(k=>k.colaborador_id===c.id)||[];
      const regs=allRegs?.filter(r=>r.colaborador_id===c.id)||[];
      let extra=0;
      if(c.tipo==='A'){
        let b=0;kpis.forEach(k=>{const r=regs.find(x=>x.kpi_id===k.id);b+=c.pago_maximo*((r?.cumplimiento_pct||0)/100)});
        extra=b>c.pago_basal?b-c.pago_basal:0;
      } else {
        kpis.forEach(k=>{const r=regs.find(x=>x.kpi_id===k.id);extra+=(r?.cantidad||0)*(k.valor_unitario||0)});
      }
      totalDif+=extra;countDif++;
      const idx=colaboradores.findIndex(x=>x.id===c.id);
      const label=c.tipo==='A'?'diferenciación':c.tipo==='C'?'entregables':'extras';
      html+=`<div class="collab-card-admin">
        <div class="cca-left"><div class="avatar ${avClass(idx)}" style="width:36px;height:36px;font-size:12px">${initials(c.nombre)}</div>
        <div><div class="cca-name">${c.nombre}</div><div class="cca-meta">${c.puesto||''} · ${label}</div></div></div>
        <div><div class="cca-amount" style="color:var(--green);font-size:17px;font-weight:700">${fmt(extra)}</div></div>
      </div>`;
    });
  });

  if(!countDif) html='<div class="empty-state" style="padding:32px 0">Sin diferenciaciones este período</div>';
  document.getElementById('kpis-list').innerHTML=html;
  document.getElementById('kpis-total-dif').textContent=fmt(totalDif);
  document.getElementById('kpis-count').textContent=countDif+' colaboradores';
}

async function crearColaborador(){
  const nombre=document.getElementById('new-nombre').value.trim();
  const puesto=document.getElementById('new-puesto').value.trim()||'Colaborador';
  const tipo=document.getElementById('new-tipo').value;

function switchMode(m){
  document.querySelectorAll('.seg-btn').forEach((b,i)=>b.classList.toggle('active',i===(m==='colab'?0:1)));
  document.getElementById('screen-colab').classList.toggle('visible',m==='colab');
  document.getElementById('screen-admin').classList.toggle('visible',m==='admin');
  document.getElementById('sidebar').style.display=m==='colab'&&isAdmin?'block':'none';
  if(m==='admin'){renderAdminResumen();loadKpisForAdmin()}
}

function switchAdminTab(tab,btn){
  document.querySelectorAll('.admin-tab').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.admin-panel').forEach(p=>p.classList.remove('visible'));
  btn.classList.add('active');
  document.getElementById('panel-'+tab).classList.add('visible');
  if(tab==='resumen')renderAdminResumen();
  if(tab==='equipo')renderTeam();
}
